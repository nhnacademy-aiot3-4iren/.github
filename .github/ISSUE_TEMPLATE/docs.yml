name: "📚 Docs"
description: "문서화 작업"
labels: ["docs"]
body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 어떤 문서를 작성/수정해야 하는지 설명해 주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 할 일을 체크박스 형태로 작성해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
