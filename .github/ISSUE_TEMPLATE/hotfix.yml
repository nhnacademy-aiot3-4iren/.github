name: "🚨 Hotfix"
description: "운영 중 긴급 장애/이슈"
title: "[Hotfix] "
labels: ["hotfix"]
body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 어떤 장애가 발생했는지, 영향 범위는 어디까지인지 설명해 주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 조치할 내용을 체크박스 형태로 작성해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
