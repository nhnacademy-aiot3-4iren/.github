name: "🔧 Refactor"
description: "리팩토링 및 유지보수 작업"
labels: ["refactor"]
body:
  - type: textarea
    attributes:
      label: 📄 설명
      description: 어떤 개선/리팩토링이 필요한지 설명해 주세요.
      placeholder: 자세히 적을수록 좋습니다!
    validations:
      required: true
  - type: textarea
    attributes:
      label: ✅ 작업할 내용
      description: 할 일을 체크박스 형태로 작성해주세요.
      placeholder: 최대한 세분화 해서 적어주세요!
    validations:
      required: true
