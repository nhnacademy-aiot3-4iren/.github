name: 🔵 Weekly Scrum
description: 주간 진행 상황을 점검하고 차주 계획을 수립합니다.
title: "[Weekly Scrum] Week X"
labels: ["Scrum", "Weekly"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🗓️ 주간 점검 정보
  - type: input
    id: week_num
    attributes:
      label: 주차
      placeholder: "ex) 3주차"
  - type: textarea
    id: sprint_goal
    attributes:
      label: 🎯 이번 주 스프린트 목표
      description: 이번 주에 반드시 끝내기로 한 핵심 목표입니다.
  - type: textarea
    id: status
    attributes:
      label: ✅ 기능별 진행 현황
      description: 필수 요소 8가지 및 담당 기능별 현재 상태를 적어주세요.
      placeholder: "- [ ] LLM 연동 (최이건) : 80% 완료"
  - type: textarea
    id: mentor_feedback
    attributes:
      label: 💡 멘토 피드백
      description: 멘토링 미팅에서 나온 주요 조언을 기록해 주세요.
  - type: textarea
    id: next_week
    attributes:
      label: 📅 차주 개발 계획
      description: 다음 주에 집중할 주요 마일스톤입니다.
